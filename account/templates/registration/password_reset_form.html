{% extends "base.html" %}

{% block title %}Password Reset{%endblock%}

{% block content %}
    <h1>Password Reset form</h1>
    <p>Enter your email to reset the password</p>
    <form method="post">
        {{form.as_p}}
        <p><input type="submit" value="Send e-mail"></p>
        {% csrf_token %}

    </form>


{% endblock %}
