{% extends "base.html" %}

{%block content%}Reset Your Password{%endblock%}

{%block content%}
    <h1>Reset your password:</h1>

    {%if validlink%}
        <p>Please enter your new password:</p>
        <form method="post">
            {{form.as_p}}
            {{csrf_token}}

            <p><input type="submit" value="Change my Password"></p>


        </form>

    {% else %}

        <p>Invalid Reset Link. Please Check Again</p>

    {% endif %}



{% endblock %}
